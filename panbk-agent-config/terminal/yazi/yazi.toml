# Yazi optimized baseline

[manager]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
linemode = "size"
show_symlink = true
scrolloff = 6

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1600

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]
open = [
  { run = 'open "$@"', desc = "Open" },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder" },
]

[open]
rules = [
  { name = "*", use = ["open", "reveal"] },
]

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">科学上网核心概念关系图</title>
  <desc id="desc">展示梯子、客户端、订阅、机场、节点、VPS、代理和目标网站之间的关系。</desc>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfaf7;
      --ink: #222222;
      --muted: #666666;
      --line: #2f3542;
      --blue: #d8ecff;
      --green: #dff4df;
      --yellow: #fff0bf;
      --red: #ffe0dc;
      --purple: #eadfff;
      --gray: #eeeeee;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151719;
        --ink: #f2f2f2;
        --muted: #b8bec8;
        --line: #d8dee9;
        --blue: #173852;
        --green: #1f442b;
        --yellow: #594617;
        --red: #5a2927;
        --purple: #3c315d;
        --gray: #2a2f35;
      }
    }
    svg { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { fill: var(--gray); stroke: var(--line); stroke-width: 2.5; rx: 18; }
    .blue { fill: var(--blue); }
    .green { fill: var(--green); }
    .yellow { fill: var(--yellow); }
    .red { fill: var(--red); }
    .purple { fill: var(--purple); }
    .title { fill: var(--ink); font-size: 34px; font-weight: 800; }
    .label { fill: var(--ink); font-size: 24px; font-weight: 750; }
    .small { fill: var(--muted); font-size: 17px; }
    .tiny { fill: var(--muted); font-size: 15px; }
    .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke-dasharray: 9 7; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="var(--line)" />
    </marker>
  </defs>

  <text x="60" y="66" class="title">梯子相关概念：从“买了机场”到“成功访问网站”</text>
  <text x="60" y="102" class="small">读图顺序：设备 -> 客户端 -> 订阅/节点 -> 代理转发 -> 目标网站</text>

  <rect x="60" y="155" width="190" height="110" class="card blue"/>
  <text x="96" y="204" class="label">你的设备</text>
  <text x="91" y="235" class="small">电脑 / 手机 / 终端</text>

  <rect x="330" y="150" width="210" height="120" class="card green"/>
  <text x="392" y="198" class="label">客户端</text>
  <text x="363" y="230" class="small">Clash / v2rayN</text>
  <text x="374" y="255" class="tiny">导入订阅、选节点</text>

  <rect x="620" y="145" width="220" height="130" class="card yellow"/>
  <text x="704" y="193" class="label">订阅</text>
  <text x="650" y="225" class="small">一个 URL 链接</text>
  <text x="649" y="250" class="tiny">包含多个节点配置</text>

  <rect x="930" y="150" width="210" height="120" class="card purple"/>
  <text x="986" y="198" class="label">机场</text>
  <text x="957" y="230" class="small">节点服务商</text>
  <text x="957" y="255" class="tiny">套餐、流量、面板</text>

  <rect x="430" y="390" width="250" height="135" class="card red"/>
  <text x="509" y="440" class="label">节点</text>
  <text x="462" y="474" class="small">代理服务器 / 出口</text>
  <text x="463" y="499" class="tiny">香港、日本、美国等</text>

  <rect x="80" y="420" width="230" height="125" class="card yellow"/>
  <text x="146" y="468" class="label">梯子</text>
  <text x="110" y="501" class="small">整套可用方案</text>
  <text x="107" y="526" class="tiny">客户端 + 订阅 + 节点</text>

  <rect x="820" y="395" width="250" height="130" class="card green"/>
  <text x="890" y="444" class="label">目标网站</text>
  <text x="860" y="477" class="small">Google / YouTube</text>
  <text x="882" y="502" class="tiny">看到节点的出口 IP</text>

  <rect x="440" y="610" width="230" height="95" class="card blue"/>
  <text x="508" y="648" class="label">VPS</text>
  <text x="470" y="680" class="small">可用来自建节点</text>

  <path d="M250 210 C285 210 295 210 330 210" class="arrow"/>
  <path d="M540 210 C575 210 585 210 620 210" class="arrow"/>
  <path d="M840 210 C880 210 890 210 930 210" class="arrow dash"/>
  <path d="M730 275 C720 350 645 382 590 390" class="arrow"/>
  <path d="M680 458 C735 458 765 458 820 458" class="arrow"/>
  <path d="M435 270 C395 330 335 393 250 430" class="arrow dash"/>
  <path d="M555 610 C555 570 555 555 555 525" class="arrow"/>

  <text x="270" y="194" class="tiny">本机代理端口</text>
  <text x="565" y="194" class="tiny">更新节点列表</text>
  <text x="862" y="194" class="tiny">机场生成</text>
  <text x="690" y="444" class="tiny">代理转发</text>
  <text x="682" y="620" class="tiny">自己租服务器后部署协议服务</text>
</svg>

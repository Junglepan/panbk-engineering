agent:
  name: panbk-agent
  version: 0.2.0
settings:
  environment: dev
  log_level: info
  profile: terminal-optimized
tools:
  required:
    - fzf
    - ripgrep
    - fd
    - bat
    - eza
    - direnv
    - mise
    - yazi
    - mediainfo
    - unar
    - p7zip
    - zoxide
managed_files:
  - ~/.zshrc
  - ~/.config/ghostty/config
  - ~/.config/yazi/yazi.toml

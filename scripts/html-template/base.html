<!doctype html>
<html lang="$LANG">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$TITLE</title>
  <style>
$STYLE
  </style>
</head>
<body>
<main class="$MAIN_CLASS">
<article>
  <header class="doc-header">
    <h1>$TITLE</h1>
    <div class="doc-meta">$META_INLINE</div>
$META_EXTRA
$LEAD
  </header>
  <div class="doc-body">
$BODY
  </div>
  <footer class="doc-footer">
    <div>源文件：<code>$SOURCE_PATH</code></div>
    <div>生成于：$BUILT_AT</div>
  </footer>
</article>
$TOC
</main>
<script>
(function () {
  document.querySelectorAll('pre > code').forEach(function (codeEl) {
    var pre = codeEl.parentElement;
    if (!pre || pre.parentElement.classList.contains('code-wrap')) return;
    var wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.type = 'button';
    btn.textContent = '复制';
    btn.addEventListener('click', function () {
      navigator.clipboard.writeText(codeEl.innerText).then(function () {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 1500);
      });
    });
    wrap.appendChild(btn);
  });
})();
</script>
</body>
</html>
